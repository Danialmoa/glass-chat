<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glass Chat</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Title bar (draggable) -->
  <div class="titlebar">
    <div class="titlebar-drag">
      <span class="app-title">Glass Chat</span>
    </div>
    <div class="titlebar-buttons">
      <button class="btn-icon btn-help" id="btn-help" title="Shortcuts">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"></circle>
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
          <line x1="12" y1="17" x2="12.01" y2="17"></line>
        </svg>
      </button>
      <button class="btn-icon btn-minimize" id="btn-minimize" title="Hide (Ctrl+Space)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
      <button class="btn-icon btn-close" id="btn-close" title="Close">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
  </div>

  <!-- Chat messages area -->
  <div class="chat-container" id="chat-container">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">
        <svg width="48" height="52" viewBox="0 0 48 52" fill="none">
          <!-- Chat bubble -->
          <rect x="2" y="2" width="44" height="34" rx="8" fill="rgba(255,255,255,0.12)"/>
          <polygon points="8,34 8,46 18,34" fill="rgba(255,255,255,0.12)"/>
          <!-- Claude mascot -->
          <!-- Ears -->
          <rect x="15" y="9" width="4" height="3" rx="1" fill="#C8836A"/>
          <rect x="29" y="9" width="4" height="3" rx="1" fill="#C8836A"/>
          <!-- Head -->
          <rect x="14" y="11" width="20" height="8" rx="3" fill="#C8836A"/>
          <!-- Eyes -->
          <rect x="18" y="14" width="3" height="3" rx="1" fill="#3D2820"/>
          <rect x="27" y="14" width="3" height="3" rx="1" fill="#3D2820"/>
          <!-- Body -->
          <rect x="16" y="20" width="16" height="8" rx="2" fill="#C8836A"/>
          <!-- Legs -->
          <rect x="18" y="28" width="2" height="4" rx="0.5" fill="#C8836A"/>
          <rect x="22" y="28" width="2" height="4" rx="0.5" fill="#C8836A"/>
          <rect x="26" y="28" width="2" height="4" rx="0.5" fill="#C8836A"/>
          <rect x="30" y="28" width="2" height="4" rx="0.5" fill="#C8836A"/>
        </svg>
      </div>
      <p>Ask Claude anything</p>
      <span class="shortcut-hint">Double ⌘ to toggle</span>
    </div>
  </div>

  <!-- Screenshot preview -->
  <div class="screenshot-preview" id="screenshot-preview" style="display: none;">
    <img id="screenshot-img" />
    <button class="btn-remove-screenshot" id="btn-remove-screenshot">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  </div>

  <!-- History panel -->
  <div class="history-panel" id="history-panel" style="display: none;">
    <div class="history-header">
      <span>Chat History</span>
      <button class="btn-icon" id="btn-close-history">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <div class="history-list" id="history-list"></div>
  </div>

  <!-- Help panel -->
  <div class="help-panel" id="help-panel" style="display: none;">
    <div class="history-header">
      <span>Keyboard Shortcuts</span>
      <button class="btn-icon" id="btn-close-help">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <div class="help-list">
      <div class="help-row"><kbd>⌘ ⌘</kbd><span>Toggle Glass Chat</span></div>
      <div class="help-row"><kbd>⌘ N</kbd><span>New chat</span></div>
      <div class="help-row"><kbd>⌘ H</kbd><span>Chat history</span></div>
      <div class="help-row"><kbd>Enter</kbd><span>Send message</span></div>
      <div class="help-row"><kbd>Shift Enter</kbd><span>New line</span></div>
      <div class="help-row"><kbd>⌘ ←</kbd><span>Snap to left</span></div>
      <div class="help-row"><kbd>⌘ →</kbd><span>Snap to right</span></div>
      <div class="help-row"><kbd>Esc</kbd><span>Close panel</span></div>
      <div class="help-divider"></div>
      <div class="help-section">In History</div>
      <div class="help-row"><kbd>↑ ↓</kbd><span>Navigate chats</span></div>
      <div class="help-row"><kbd>Enter</kbd><span>Open selected</span></div>
      <div class="help-row"><kbd>Delete</kbd><span>Delete selected</span></div>
    </div>
  </div>

  <!-- Input area -->
  <div class="input-area">
    <button class="btn-icon btn-screenshot" id="btn-screenshot" title="Take Screenshot">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
        <circle cx="8.5" cy="8.5" r="1.5"></circle>
        <polyline points="21 15 16 10 5 21"></polyline>
      </svg>
    </button>
    <textarea
      id="message-input"
      placeholder="Message Claude..."
      rows="1"
      autofocus
    ></textarea>
    <button class="btn-send" id="btn-send" title="Send">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
    <button class="btn-stop" id="btn-stop" title="Stop" style="display: none;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <rect x="6" y="6" width="12" height="12" rx="2"></rect>
      </svg>
    </button>
  </div>

  <script src="marked.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
