<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glass Chat</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Title bar (draggable) -->
  <div class="titlebar">
    <div class="titlebar-drag">
      <span class="app-title">Glass Chat</span>
    </div>
    <div class="titlebar-buttons">
      <button class="btn-icon btn-new" id="btn-new" title="New Chat">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
      <button class="btn-icon btn-minimize" id="btn-minimize" title="Hide (Ctrl+Space)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
      <button class="btn-icon btn-close" id="btn-close" title="Close">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
  </div>

  <!-- Chat messages area -->
  <div class="chat-container" id="chat-container">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
      </div>
      <p>Ask Claude anything</p>
      <span class="shortcut-hint">Double ⌘ to toggle</span>
    </div>
  </div>

  <!-- Screenshot preview -->
  <div class="screenshot-preview" id="screenshot-preview" style="display: none;">
    <img id="screenshot-img" />
    <button class="btn-remove-screenshot" id="btn-remove-screenshot">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  </div>

  <!-- History panel -->
  <div class="history-panel" id="history-panel" style="display: none;">
    <div class="history-header">
      <span>Chat History</span>
      <button class="btn-icon" id="btn-close-history">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <div class="history-list" id="history-list"></div>
  </div>

  <!-- Input area -->
  <div class="input-area">
    <button class="btn-icon btn-screenshot" id="btn-screenshot" title="Take Screenshot">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
        <circle cx="8.5" cy="8.5" r="1.5"></circle>
        <polyline points="21 15 16 10 5 21"></polyline>
      </svg>
    </button>
    <textarea
      id="message-input"
      placeholder="Message Claude..."
      rows="1"
      autofocus
    ></textarea>
    <button class="btn-send" id="btn-send" title="Send">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
    <button class="btn-stop" id="btn-stop" title="Stop" style="display: none;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <rect x="6" y="6" width="12" height="12" rx="2"></rect>
      </svg>
    </button>
  </div>

  <script src="app.js"></script>
</body>
</html>
